<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="autoprgr2.css">
  <link rel="icon" type="Images/x-icon" href="styles/gaaicon.ico"/>
<style>.player{display: none;}</style>
</head>
<body>
<div id="particles-js"></div>

<div class="container-fluid text-center">
<h3 class="font75">Красавицы</h3>

<div class="row"><div class="col-4">

<iframe
id="inlineFrameExample"
title="Inline Frame Example"
width="450"
height="320"
src="dayneko/autodaynsm.html">
<!-- src="https://www.openstreetmap.org/export/embed.html?bbox=-0.004017949104309083%2C51.47612752641776%2C0.00030577182769775396%2C51.478569861898606&amp;layer=mapnik"> -->
</iframe>

</div><div class="col-4">

<span class="mb-4 text-center">    <!-- Итак, Вы попали на этот сайт. Определить пароль Вам будет немного сложнее. -->
Этот пароль Вы не знаете, но если определить его не получается, можете попробовать его подобрать
Послушать музыку без плеера Вы можете
<button class="zapplay" onclick="playpauseTrack()">Запуск/Стоп</button>
Для доступа к плееру нужен пароль
</span>

<div class="player" id="player">
  <div class="details">
      <div class="now-playing">Слушаем x из y</div>
      <div class="track-art"></div>
      <div class="track-name">Название</div>
      <div class="track-artist">Исполнитель</div>
  </div>
  <div class="buttons">
      <div class="prev-track" onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></div>
      <div class="playpause-track" onclick="playpauseTrack()"><i class="fa fa-play-circle fa-5x"></i></div>
      <div class="next-track" onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></div>
  </div>
  <div class="slider_container">
      <div class="current-time">00:00</div>
      <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
      <div class="total-duration">00:00</div>
  </div>
  <div class="slider_container">
      <i class="fa fa-volume-down"></i>
      <input type="range" min="1" max="100" value="99" class="volume_slider" onchange="setVolume()">
      <i class="fa fa-volume-up"></i>
  </div>
</div>

<form name="Form1">
<div class="form-group" style="text-align: center; font-size: 1.9rem;">Введите пароль</div>
<div class="form-group">
  <input type="password" class="form-control" name="password" placeholder="Пароль" required>
</div>
<div class="form-group">
  <button type="button" class="form-control btn bg-transporent submit px-3" onclick="validate()">Вход</button>
</div>
</form>
  
</div><div class="col-4">

<iframe
id="inlineFrameExample"
title="Inline Frame Example"
width="450"
height="320"
src="temnikova/autotemnsm.html">
</iframe>
    
</div></div></div>
