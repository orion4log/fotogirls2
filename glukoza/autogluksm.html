<script>
$(document).ready(function() {
    $('.owl-carousel').owlCarousel({
      items: 1, // Количество элементов, которые будут отображаться на экране
      margin: 500, // Отступ справа от элемента в пикселях (margin-right)
      dots:false, // Отображает навигацию в виде точек
        loop:true,
        nav:true,
        // navText: ["Назад", "Вперёд"],
        navText: false,
        autoplay:true,
autoplayHoverPause:true,
// animateOut : "slideOutUp", //  отобразить вертикально
// animateIn : "slideInUp",
// slideBy : 7, //перелистывание на несколько слайдов (по умолчанию - по одному)
        smartSpeed:1000, //Время движения слайда
        autoplayTimeout:3000, //Время смены слайда
        center:false,        // margin:10,  dots:true,  margin:1, Отступ от картино если выводите больше 1
        mouseDrag:true,
        responsive:{ //Адаптация в зависимости от разрешения экрана
            0:{
                items:1
            },
            600:{
                items:1
            },
            1000:{
                items:1
            }
        }
    });
});

</script>
