  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="autoprgr2.css">
<style>img{border: 1px dashed darkgreen;  border-radius: 1rem; }</style>

</head>
<body>
<div class="preloader">
  <div class="prob">
      <p style="color: black;">Все фотки будут показаны после полной загрузки</p>
  </div>
</div>
<div id="particles-js"></div>

<div class="container-fluid text-center">
<h3 class="font75">Красавицы</h3>

<div class="row"><div class="col-4">
<a href="dayneko/autodayn.html" target="_blank">
  <img src="dayneko/dayneko_90.jpg" class="fotkmain" alt="Нет фото">
<button class="btn btn-primary bg-transparent">Виктория Дайнеко (р. 12 мая 1987 года)</button></a>
</div><div class="col-4">

<div class="player" id="player">
  <div class="details">
      <div class="now-playing">Слушаем x из y</div>
      <div class="track-art"></div>
      <div class="track-name">Название</div>
      <div class="track-artist">Исполнитель</div>
  </div>
  <div class="buttons">
      <div class="prev-track" onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></div>
      <div class="playpause-track" onclick="playpauseTrack()"><i class="fa fa-play-circle fa-5x"></i></div>
      <div class="next-track" onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></div>
  </div>
  <div class="slider_container">
      <div class="current-time">00:00</div>
      <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
      <div class="total-duration">00:00</div>
  </div>
  <div class="slider_container">
      <i class="fa fa-volume-down"></i>
      <input type="range" min="1" max="100" value="99" class="volume_slider" onchange="setVolume()">
      <i class="fa fa-volume-up"></i>
  </div>
</div>

</div><div class="col-4">
<a href="temnikova/autotemn.html" target="_blank">
  <img src="temnikova/temnik_90.jpg" class="fotkmain" alt="Нет фото">
<button class="btn btn-primary bg-transparent">Елена Темникова (р. 18 апреля 1985 года)</button></a>
</div></div></div>
<br>

<div class="container-fluid text-center">

<div class="row"><div class="col-4">

<button class="btn btn-primary bg-transparent">Екатерина Ли (р. 7 декабря 1984 года)</button></a>
</div><div class="col-4">
<a href="pletneva/autoptetn.html" target="_blank">
  <img src="pletneva/ptetneva_90.jpg" class="fotkmain" alt="Нет фото">
<button class="btn btn-primary bg-transparent">Анна Плетнёва (р. 21 августа 1977 года)</button></a>
</div><div class="col-4">
<a href="glukoza/autogluk.html" target="_blank">
  <img src="glukoza/glukoza_90.jpg" class="fotkmain" alt="Нет фото">

</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script src="styles/preloadnew.js"></script>
<!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script> -->
<script src="styles/jquery.min.js"></script>
<script src="styles/owl.carousel.min.js"></script>
<script>
$(document).ready(function() {
    $('.owl-carousel').owlCarousel({
        loop:true,
        nav:true,
        navText: ["Назад", "Вперёд"],
        autoplay:true,
autoplayHoverPause:true,
// animateOut : "slideOutUp", //  отобразить вертикально
// animateIn : "slideInUp",
// slideBy : 7, //перелистывание на несколько слайдов (по умолчанию - по одному)
        smartSpeed:3000, //Время движения слайда
        autoplayTimeout:5000, //Время смены слайда
        center:true,        // margin:10,  dots:true,  margin:1, Отступ от картино если выводите больше 1
        mouseDrag:true,
        responsive:{ //Адаптация в зависимости от разрешения экрана
            0:{
                items:1
            },
            600:{
                items:1
            },
            1000:{
                items:1
            }
        }
    });
});

$('.autoplay').slick({
  slidesToShow: 3,
  slidesToScroll: 1,
  autoplay: true,
  autoplaySpeed: 2000,
  pauseOnHover: true
});

</script>

<script src="styles/particles.min.js"></script>
<script src="styles/app.js"></script>
<script src="styles/audioplay.js"></script>    

<script src="styles/validprov.js"></script>
